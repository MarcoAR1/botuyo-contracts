name: Publish to npm

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

concurrency:
  group: contracts-publish
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + automatic provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish if version changed
        shell: bash
        run: |
          PUBLISHED=$(npm show @botuyo/contracts version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            npm publish --access public
            echo "Published v$LOCAL to npm"
          else
            echo "Version $LOCAL already published — skipped"
          fi
